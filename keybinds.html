<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Keybinds</title>
    <!-- used in conjunction w/ keyboard-layout-editor.com to render the keymaps   -->

    <style>
        body {
            background: #161616;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            color: #bfbfbf;
            padding: 2em;
        }
    </style>
    <style>
        .minikey {
            background: #313131;
            color: #eaeaea;
            margin: 3px 2px;
            padding: 6px;
            border-radius: 5px;
            box-shadow:
                    inset 0 -4px #2a2a2a,
                    inset 0 -1px 0 2px #2a2a2a;
            outline: 1px solid black;
            display: inline-block;
            min-width: 24px;
            text-align: center;
        }
        .keylabel10 {
            font-size: .6em !important;
            margin-top: 0;
            opacity: 0.85;
        }
        .keylabel10, .gray {
            color: #d1d1d1 !important;
        }
        .blue {
            color: #5fa1cb;
        }
        .red {
            color: #d35623;
        }
        .green {
            color: #25bc50;
        }
        .purple {
            color: #a448e8;
        }
        .white {
            color: #eaeaea;
        }
        .white.block {
            opacity: 0.85;
        }
        .block {
            display: block;
        }
        .x-flip {
            transform: scaleX(-1);
        }
        .p3 {
            padding: 3px;
        }
        .ml0 {
            margin-left: 0;
        }
        .ml3 {
            margin-left: 3px;
        }
        .ml5 {
            margin-left: 5px;
        }
        .larger {
            font-size: 1.2em;
        }
        u {
            font-size: 1.1em;
        }
        .list {
            display: flex;
            flex-direction: column;
            top: 1.5em;
        }
        .kb-Multimedia-Play {
            position: relative;
            bottom: 1px;
        }
        .x-flip.kb-Multimedia-Play {
            left: -3px;
            padding-left: 3px;
        }
    </style>
</head>
<body>
<div class='list'>
    <span>
        <span class='minikey ml0'>CapsLock</span>:<span class='minikey ml5'>Esc</span>
    </span>
    <span>
        <span class='minikey ml0'>Win</span> + <span class='minikey'>CapsLock</span>:<span class='minikey ml5'>CapsLock</span>
    </span>
    <span class="ml3">
        Hold <span class='minikey'>CapsLock</span>: Caps layer
    </span>
    <span>
        Hold <span class='minikey'>Tab</span>:<span class='minikey ml5'>Space</span><span class='minikey'>Space</span><span class='minikey'>Space</span><span class='minikey'>Space</span>
    </span>
    <span>
        Short Hold <span class='minikey'>Esc</span>:<span class='minikey ml5'>`</span>
    </span>
    <span>
        Long Hold <span class='minikey'>Esc</span>:<span class='minikey ml5'>`</span><span class='minikey'>`</span><span class='minikey'>`</span>
    </span>
    <span>
        <span class='minikey ml0'>Ctrl</span> + <span class='minikey'>;</span>:<span class='minikey ml5'>End</span><span class='minikey'>;</span>
    </span>
    <span>
        <span class='minikey ml0'>Ctrl</span> + <span class='minikey'>PrtSc</span>: <span class='minikey ml5'>Win</span>+<span class='minikey'>V</span>
    </span>
    <span>
        <span class='minikey ml0'>Shift</span> + <span class='minikey'>PrtSc</span>:<span class='minikey ml5'>Ctrl</span>+<span class='minikey'>A</span>
    </span>
</div>
</body>
</html>
