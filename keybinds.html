<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Keybinds</title>
    <!-- used in conjunction w/ keyboard-layout-editor.com to render the keymaps   -->

    <style>
        body {
            background: #161616;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            color: #bfbfbf;
            padding: 2em;
        }
    </style>
    <style>
        div {
            line-height: 1.15em;
        }
        .keylabels:has(u) {
            padding-left: 0px !important;
        }
        .minikey {
            background: #313131;
            color: #eaeaea;
            margin: 3px 2px;
            padding: 6px;
            border-radius: 5px;
            box-shadow:
                    inset 0 -4px #2a2a2a,
                    inset 0 -1px 0 2px #2a2a2a;
            outline: 1px solid black;
            display: inline-block;
            min-width: 24px;
            text-align: center;
        }
        .keylabel10 {
            font-size: .6em !important;
            margin-top: 0;
            opacity: 0.85;
        }
        .keylabel10, .gray {
            color: #d1d1d1 !important;
        }
        .blue {
            color: #50a3d7;
        }
        .red {
            color: #d35623;
        }
        .yellow {
            color: #d3b123;
        }
        .green {
            color: #25bc50;
        }
        .purple {
            color: #a448e8;
        }
        .white {
            color: #eaeaea;
        }
        .white.block {
            opacity: 0.85;
        }
        .block {
            display: block;
        }
        .x-flip {
            transform: scaleX(-1);
        }
        .m2 {
            margin: 2px;
        }
        .m3 {
            margin: 3px;
        }
        .ml0 {
            margin-left: 0;
        }
        .ml3 {
            margin-left: 3px;
        }
        .ml5 {
            margin-left: 5px;
        }
        .larger {
            font-size: 1.2em;
        }
        u {
            font-size: 1.1em;
            display: block;
            margin-bottom: .35em;
        }
        .list {
            display: flex;
            flex-direction: column;
            top: 1.5em;
        }
        .grid {
            display: grid;
            grid-template-columns: max-content 1fr;
            column-gap: 8px;
            row-gap: 6px;
            align-items: center;
            top: 1.5em;
        }
        .lhs {
            text-align: right;
            white-space: nowrap;
        }
        .rhs {
            white-space: nowrap;
        }
        .kb-Multimedia-Play {
            position: relative;
            bottom: 1px;
        }
        .x-flip.kb-Multimedia-Play {
            left: -3px;
            padding-left: 3px;
        }
    </style>
</head>
<body>
<div class="grid">
    <!--<span class="lhs"><span class="minikey">CapsLock</span></span>
    <span class="rhs"><span class="minikey">Esc</span></span>

    <span class="lhs"><span class="minikey">Win</span> + <span class="minikey">CapsLock</span></span>
    <span class="rhs"><span class="minikey">CapsLock</span></span>

    <span class="lhs">Hold <span class="minikey">CapsLock</span></span>
    <span class="rhs"><span class="minikey">Caps Layer</span></span>

    <span class="lhs"><span class="minikey">Ctrl</span> + <span class="minikey">;</span></span>
    <span class="rhs"><span class="minikey">End</span><span class="minikey">;</span></span>

    <span class="lhs"><span class="minikey">Ctrl</span> + <span class="minikey">PrtSc</span></span>
    <span class="rhs"><span class="minikey">Win</span>+<span class="minikey">V</span></span>

    <span class="lhs"><span class="minikey">Alt</span> + <span class="minikey">PrtSc</span></span>
    <span class="rhs"><span class="minikey">Ctrl</span>+<span class="minikey">A</span></span>

    <span class="lhs">Hold <span class="minikey">Tab</span></span>
    <span class="rhs"><span class="minikey">Space</span><span class="minikey">Space</span><span class="minikey">Space</span><span class="minikey">Space</span></span>

    <span class="lhs">Short Hold <span class="minikey">Esc</span></span>
    <span class="rhs"><span class="minikey">`</span></span>

    <span class="lhs">Long Hold <span class="minikey">Esc</span></span>
    <span class="rhs"><span class="minikey">`</span><span class="minikey">`</span><span class="minikey">`</span></span>-->

    <div class="list">
        <span>
            <span class="minikey ml0">CapsLock</span>:
            <span class="minikey ml5">Esc</span>
        </span>
        </span>
            <span>
            <span class="minikey ml0">Win</span> + <span class="minikey">CapsLock</span>:
            <span class="minikey ml5">CapsLock</span>
        </span>
        <span>
            <span class='minikey ml0'>Ctrl</span> + <span class='minikey'>;</span>:
            <span class='minikey ml5'>End</span><span class='minikey'>;</span>     </span>     <span>
        </span>
    </div>

    <div class='list'>
        <span>
            <span class='minikey ml0'>Copilot</span>:
            <span class='minikey ml5'>PrtSc</span> or <span class='minikey'>Ctrl</span>
        </span>
        <span>
            <span class='minikey ml0'>Ctrl</span> + <span class='minikey'>PrtSc</span>:
            <span class='minikey ml5'>Win</span>+<span class='minikey'>V</span>
        </span>
        <span>
            <span class='minikey ml0'>Alt</span> + <span class='minikey'>PrtSc</span>:
            <span class='minikey ml5'>Ctrl</span>+<span class='minikey'>A</span>
        </span>
    </div>

    <div class="list">
        <span>
            Hold <span class="minikey">Tab</span>:
            <span class="minikey ml5">Space</span><span class="minikey">Space</span><span class="minikey">Space</span><span class="minikey">Space</span>
        </span>
            <span>
            Short Hold <span class="minikey">Esc</span>:
            <span class="minikey ml5">`</span>
        </span>
            <span>
            Long Hold <span class="minikey">Esc</span>:
            <span class="minikey ml5">`</span><span class="minikey">`</span><span class="minikey">`</span>
        </span>
    </div>
</div>
</body>
</html>
